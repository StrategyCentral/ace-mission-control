<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACE // Mission Control</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#030912;--glass:rgba(8,22,50,0.72);--gb:rgba(25,159,216,0.18);--gbh:rgba(25,159,216,0.5);--blue:#199FD8;--blue-g:rgba(25,159,216,0.3);--yellow:#FCC82E;--pink:#FF2D9B;--purple:#9B59B6;--green:#00E676;--orange:#FF6B35;--red:#FF3355;--teal:#00BCD4;--text:#C8E8F8;--textd:rgba(200,232,248,0.45);--textb:#EAF6FF;--D:'Orbitron',monospace;--M:'Share Tech Mono',monospace;--B:'Rajdhani',sans-serif;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--M);font-size:13px;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;background-image:radial-gradient(ellipse at 20% 25%,rgba(25,159,216,0.09) 0%,transparent 55%),radial-gradient(ellipse at 80% 75%,rgba(255,45,155,0.06) 0%,transparent 45%),linear-gradient(rgba(25,159,216,0.022) 1px,transparent 1px),linear-gradient(90deg,rgba(25,159,216,0.022) 1px,transparent 1px);background-size:100% 100%,100% 100%,50px 50px,50px 50px;pointer-events:none;}
body::after{content:'';position:fixed;inset:0;z-index:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.06) 3px,rgba(0,0,0,0.06) 6px);pointer-events:none;}
#root{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column;}
.tb{display:flex;align-items:center;height:48px;flex-shrink:0;background:rgba(3,9,18,0.95);border-bottom:1px solid var(--gb);padding:0 18px;gap:14px;position:relative;overflow:hidden;}
.tb::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--blue),var(--pink),var(--blue),transparent);animation:tl 6s ease-in-out infinite;}
@keyframes tl{0%,100%{opacity:.35}50%{opacity:.85}}
.logo{font-family:var(--D);font-size:16px;font-weight:900;letter-spacing:5px;color:var(--blue);text-shadow:0 0 20px var(--blue-g);cursor:pointer;flex-shrink:0;}
.logo span{color:var(--yellow);}
.tb-sep{width:1px;height:20px;background:var(--gb);}
.tb-m{display:flex;gap:18px;}
.met{display:flex;flex-direction:column;gap:1px;min-width:65px;}
.met-l{font-size:8px;letter-spacing:2px;color:var(--textd);text-transform:uppercase;}
.met-v{font-family:var(--D);font-size:12px;font-weight:700;}
.met-v.y{color:var(--yellow);}
.met-v.b{color:var(--blue);}
.met-v.g{color:var(--green);}
.met-v.o{color:var(--orange);}
.sp{flex:1;}
.sys-st{display:flex;align-items:center;gap:7px;font-size:10px;letter-spacing:2px;text-transform:uppercase;}
.dot{width:8px;height:8px;border-radius:50%;animation:pd 2s ease infinite;}
.dot.g{background:var(--green);box-shadow:0 0 8px var(--green);}
@keyframes pd{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
.clk{font-family:var(--D);font-size:11px;color:rgba(200,232,248,.38);letter-spacing:2px;margin-left:10px;}
.ml{flex:1;display:flex;overflow:hidden;}
.gp{background:var(--glass);border:1px solid var(--gb);border-radius:3px;backdrop-filter:blur(14px);position:relative;overflow:hidden;}
.gp::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--blue-g),transparent);}
.ph{font-family:var(--D);font-size:8px;letter-spacing:3px;color:rgba(200,232,248,.45);text-transform:uppercase;display:flex;align-items:center;gap:7px;margin-bottom:11px;}
.ph::before{content:'//';color:var(--blue);font-size:9px;}
.lp{width:220px;flex-shrink:0;padding:11px;display:flex;flex-direction:column;gap:9px;border-right:1px solid var(--gb);background:rgba(3,8,20,.65);overflow-y:auto;}
.rp{width:220px;flex-shrink:0;padding:11px;display:flex;flex-direction:column;gap:9px;border-left:1px solid var(--gb);background:rgba(3,8,20,.65);overflow-y:auto;}
.cp{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px;gap:6px;}
.mr{margin-bottom:8px;}
.mh{display:flex;justify-content:space-between;font-size:10px;margin-bottom:3px;}
.mk{color:var(--textd);text-transform:uppercase;letter-spacing:1px;}
.mb{height:3px;background:rgba(25,159,216,.1);overflow:hidden;}
.mf{height:100%;position:relative;transition:width 1.2s ease;}
.mf::after{content:'';position:absolute;right:0;top:0;bottom:0;width:4px;background:rgba(255,255,255,.7);}
.kv{display:flex;justify-content:space-between;align-items:center;font-size:10px;padding:3px 0;border-bottom:1px solid rgba(25,159,216,.06);}
.kv:last-child{border-bottom:none;}
.kk{color:var(--textd);text-transform:uppercase;letter-spacing:1px;}
.vv.b{color:var(--blue);}
.vv.g{color:var(--green);}
.vv.y{color:var(--yellow);}
.vv.o{color:var(--orange);}
.vv.p{color:var(--pink);}
.vv.r{color:var(--red);}
.vv.pu{color:var(--purple);}
.vv.t{color:var(--teal);}
.le{display:flex;gap:5px;font-size:10px;padding:5px 0;border-bottom:1px solid rgba(25,159,216,.05);animation:fi .3s ease;}
@keyframes fi{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:translateY(0)}}
.lts{color:var(--yellow);flex-shrink:0;font-size:9px;}
.lm{flex:1;color:var(--text);line-height:1.4;}
.lt{font-size:8px;padding:1px 5px;border-radius:2px;flex-shrink:0;align-self:flex-start;}
.lt.sys{background:rgba(25,159,216,.15);color:var(--blue);}
.lt.ok{background:rgba(0,230,118,.12);color:var(--green);}
.lt.warn{background:rgba(255,107,53,.14);color:var(--orange);}
.lt.trade{background:rgba(252,200,46,.12);color:var(--yellow);}
.lt.mkt{background:rgba(255,45,155,.12);color:var(--pink);}
.oc{display:flex;flex-direction:column;align-items:center;}
.oname{font-family:var(--D);font-size:22px;font-weight:900;letter-spacing:8px;color:var(--textb);text-shadow:0 0 30px var(--blue-g);margin-bottom:2px;}
.ost{font-family:var(--D);font-size:9px;letter-spacing:4px;text-transform:uppercase;margin-top:4px;height:16px;}
.ca{display:flex;flex-direction:column;align-items:center;gap:7px;width:100%;max-width:380px;}
.cir{display:flex;gap:7px;width:100%;}
.ci{flex:1;background:rgba(25,159,216,.06);border:1px solid var(--gb);border-radius:3px;color:var(--text);font-family:var(--M);font-size:12px;padding:8px 12px;outline:none;}
.ci:focus{border-color:var(--blue);}
.ci::placeholder{color:var(--textd);}
.mb-btn{width:38px;height:38px;border-radius:50%;border:1px solid var(--gb);background:rgba(25,159,216,.1);color:var(--blue);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .2s;flex-shrink:0;}
.mb-btn.on{border-color:var(--pink);color:var(--pink);background:rgba(255,45,155,.15);}
.qa{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;}
.qb{padding:5px 12px;background:transparent;border:1px solid var(--gb);border-radius:2px;color:var(--textd);font-family:var(--M);font-size:10px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .2s;}
.qb:hover{border-color:var(--blue);color:var(--blue);}
.tbox{font-size:11px;color:var(--textd);text-align:center;font-style:italic;min-height:16px;max-width:340px;}
.rbox{font-size:11px;color:var(--text);text-align:center;max-width:360px;line-height:1.55;background:rgba(25,159,216,.05);padding:8px 12px;border:1px solid rgba(25,159,216,.15);border-radius:3px;margin-top:4px;}
/* FOREX */
.fx-item{display:flex;align-items:flex-start;gap:6px;padding:5px 0;border-bottom:1px solid rgba(25,159,216,.06);font-size:10px;}
.fx-folder{font-size:14px;flex-shrink:0;margin-top:1px;}
.fx-folder.red{filter:drop-shadow(0 0 5px rgba(255,51,85,.9));}
.fx-folder.orange{filter:drop-shadow(0 0 4px rgba(255,107,53,.7));}
.fx-folder.yellow{filter:drop-shadow(0 0 3px rgba(252,200,46,.5));}
.fx-body{flex:1;}
.fx-time{color:var(--yellow);font-size:9px;}
.fx-curr{color:var(--blue);font-size:9px;margin-left:4px;}
.fx-title{color:var(--text);margin-top:1px;line-height:1.3;}
.fx-prev{color:var(--textd);font-size:9px;margin-top:1px;}
/* BOTTOM NAV */
.bn{height:54px;flex-shrink:0;background:rgba(3,9,18,.96);border-top:1px solid var(--gb);display:flex;align-items:center;padding:0 10px;gap:2px;overflow-x:auto;}
.bn::-webkit-scrollbar{height:2px;}
.bn::-webkit-scrollbar-thumb{background:rgba(25,159,216,.2);}
/* MAP */
.map-world-wrap{position:relative;width:100%;height:100%;overflow:hidden;cursor:grab;background:radial-gradient(ellipse at center,rgba(25,159,216,0.04) 0%,transparent 70%);}
.map-node{position:absolute;border-radius:4px;cursor:default;transition:box-shadow .3s;user-select:none;overflow:hidden;}
.map-node.live{box-shadow:0 0 20px rgba(0,230,118,0.5),0 0 40px rgba(0,230,118,0.2);}
.map-node.building{box-shadow:0 0 20px rgba(255,107,53,0.5),0 0 40px rgba(255,107,53,0.2);}
.map-node.notstarted{box-shadow:0 0 20px rgba(255,51,85,0.5),0 0 40px rgba(255,51,85,0.2);}
.map-node-img-wrap{position:relative;cursor:pointer;display:block;}
.map-node-img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;}
.map-node-img-ph{width:100%;aspect-ratio:16/9;background:rgba(25,159,216,0.08);border:2px dashed rgba(25,159,216,0.25);display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--textd);}
.map-node-dive-overlay{position:absolute;inset:0;background:rgba(3,9,18,0.75);display:flex;align-items:center;justify-content:center;font-family:var(--D);font-size:10px;font-weight:700;letter-spacing:3px;color:var(--blue);opacity:0;transition:opacity .2s;}
.map-node-img-wrap:hover .map-node-dive-overlay{opacity:1;}
.map-node-bar{padding:8px 10px;background:rgba(5,15,32,0.97);border-top:1px solid rgba(25,159,216,0.2);}
.map-node-name{font-family:var(--D);font-size:10px;font-weight:700;letter-spacing:2px;color:var(--textb);margin-bottom:5px;}
.map-node-actions{display:flex;align-items:center;gap:4px;margin-bottom:4px;}
.map-visit-btn{padding:3px 8px;border-radius:3px;border:1px solid var(--blue);background:rgba(25,159,216,0.1);color:var(--blue);font-family:var(--D);font-size:8px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:all .15s;flex:1;text-align:center;}
.map-visit-btn:hover{background:rgba(25,159,216,0.25);}
.map-edit-btn{background:transparent;border:1px solid var(--gb);color:var(--textd);cursor:pointer;font-size:11px;padding:2px 7px;border-radius:3px;transition:all .15s;flex-shrink:0;}
.map-edit-btn:hover{border-color:var(--blue);color:var(--blue);}
.map-node-status{font-size:8px;letter-spacing:1px;text-transform:uppercase;}
.map-node-status.live{color:var(--green);}
.map-node-status.building{color:var(--orange);}
.map-node-status.notstarted{color:var(--red);}
.map-modal{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);}
.map-modal-box{background:rgba(5,15,32,0.98);border:1px solid var(--gb);border-radius:6px;padding:24px;width:420px;max-width:90vw;max-height:85vh;overflow-y:auto;}
.map-modal-title{font-family:var(--D);font-size:12px;letter-spacing:3px;color:var(--blue);margin-bottom:18px;text-transform:uppercase;}
.map-input{width:100%;background:rgba(25,159,216,0.06);border:1px solid var(--gb);border-radius:3px;color:var(--text);font-family:var(--M);font-size:12px;padding:8px 12px;outline:none;margin-bottom:10px;box-sizing:border-box;}
.map-input:focus{border-color:var(--blue);}
.map-select{width:100%;background:rgba(25,159,216,0.06);border:1px solid var(--gb);border-radius:3px;color:var(--text);font-family:var(--M);font-size:12px;padding:8px 12px;outline:none;margin-bottom:10px;cursor:pointer;}
.map-btn{padding:8px 18px;border-radius:3px;border:1px solid;font-family:var(--M);font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;}
.map-btn.primary{background:rgba(25,159,216,0.15);border-color:var(--blue);color:var(--blue);}
.map-btn.primary:hover{background:rgba(25,159,216,0.3);}
.map-btn.danger{background:rgba(255,51,85,0.1);border-color:var(--red);color:var(--red);}
.map-btn.secondary{background:transparent;border-color:var(--gb);color:var(--textd);}
.map-toolbar{position:absolute;top:14px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:20;background:rgba(3,9,18,0.92);padding:8px 14px;border-radius:30px;border:1px solid var(--gb);backdrop-filter:blur(10px);}
.map-tb-btn{padding:5px 14px;border-radius:20px;border:1px solid var(--gb);background:transparent;color:var(--textd);font-family:var(--M);font-size:9px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;}
.map-tb-btn:hover,.map-tb-btn.active{border-color:var(--blue);color:var(--blue);background:rgba(25,159,216,0.1);}
.map-zoom-ctrl{position:absolute;bottom:20px;right:20px;display:flex;flex-direction:column;gap:4px;z-index:20;}
.map-zoom-btn{width:32px;height:32px;background:rgba(3,9,18,0.92);border:1px solid var(--gb);color:var(--textd);font-size:15px;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:var(--M);line-height:1;}
.map-zoom-btn:hover{border-color:var(--blue);color:var(--blue);}
.map-zoom-label{font-family:var(--M);font-size:8px;color:var(--textd);text-align:center;letter-spacing:1px;padding:2px 0;}
/* DEEP DIVE */
.dd-overlay{position:fixed;inset:0;background:rgba(2,6,14,0.99);z-index:500;display:flex;flex-direction:column;overflow:hidden;}
.dd-header{padding:14px 20px;border-bottom:1px solid var(--gb);display:flex;align-items:center;gap:14px;background:rgba(3,9,18,0.95);flex-shrink:0;flex-wrap:wrap;}
.dd-back{padding:6px 14px;border-radius:20px;border:1px solid var(--gb);background:transparent;color:var(--textd);font-family:var(--M);font-size:9px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;flex-shrink:0;}
.dd-back:hover{border-color:var(--blue);color:var(--blue);}
.dd-title{font-family:var(--D);font-size:16px;font-weight:900;letter-spacing:4px;color:var(--textb);}
.dd-status-badge{padding:4px 10px;border-radius:20px;font-family:var(--M);font-size:8px;letter-spacing:2px;text-transform:uppercase;flex-shrink:0;}
.dd-body{flex:1;display:flex;overflow:hidden;}
.dd-left{width:340px;flex-shrink:0;border-right:1px solid var(--gb);display:flex;flex-direction:column;overflow-y:auto;padding:18px 16px;}
.dd-left::-webkit-scrollbar{width:3px;}
.dd-left::-webkit-scrollbar-thumb{background:rgba(25,159,216,0.2);}
.dd-center{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.dd-3d-wrap{flex:1;position:relative;overflow:hidden;background:radial-gradient(ellipse at center,rgba(25,159,216,0.03) 0%,transparent 70%);}
.dd-nexus{height:190px;flex-shrink:0;border-top:1px solid var(--gb);padding:12px 16px;display:flex;flex-direction:column;gap:8px;background:rgba(3,9,18,0.6);}
.dd-nexus-title{font-family:var(--D);font-size:9px;letter-spacing:3px;color:var(--textd);text-transform:uppercase;flex-shrink:0;}
.dd-nexus-cards{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;flex:1;}
.dd-nexus-cards::-webkit-scrollbar{height:2px;}
.dd-nexus-cards::-webkit-scrollbar-thumb{background:rgba(25,159,216,0.2);}
.dd-nexus-card{flex-shrink:0;width:150px;background:rgba(25,159,216,0.04);border:1px solid var(--gb);border-radius:4px;padding:10px;cursor:pointer;transition:all .2s;}
.dd-nexus-card:hover{border-color:var(--blue);background:rgba(25,159,216,0.1);transform:translateY(-2px);}
.dd-nexus-card-name{font-family:var(--D);font-size:9px;letter-spacing:2px;color:var(--textb);margin-bottom:4px;}
.dd-nexus-card-status{font-size:8px;letter-spacing:1px;text-transform:uppercase;}
.dd-section{margin-bottom:16px;}
.dd-section-title{font-family:var(--D);font-size:9px;letter-spacing:3px;color:rgba(25,159,216,0.6);text-transform:uppercase;margin-bottom:8px;}
.dd-textarea{width:100%;background:rgba(25,159,216,0.04);border:1px solid var(--gb);border-radius:3px;color:var(--text);font-family:var(--M);font-size:11px;padding:10px;outline:none;resize:vertical;min-height:72px;line-height:1.6;box-sizing:border-box;}
.dd-textarea:focus{border-color:var(--blue);}
.dd-link-row{display:flex;gap:6px;align-items:center;margin-bottom:6px;padding:5px 8px;background:rgba(25,159,216,0.04);border-radius:3px;border:1px solid var(--gb);}
.dd-link-label{font-family:var(--M);font-size:10px;color:var(--blue);flex:0 0 70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.dd-link-url{font-size:9px;color:var(--textd);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-decoration:none;}
.dd-link-url:hover{color:var(--blue);}
.dd-link-del{background:transparent;border:none;color:var(--red);cursor:pointer;font-size:13px;padding:0 2px;flex-shrink:0;}
.dd-add-link{display:flex;gap:5px;margin-top:6px;}
.dd-mini-input{flex:1;background:rgba(25,159,216,0.05);border:1px solid var(--gb);border-radius:3px;color:var(--text);font-family:var(--M);font-size:10px;padding:5px 8px;outline:none;min-width:0;}
.dd-mini-input:focus{border-color:var(--blue);}
.dd-add-btn{padding:5px 10px;border-radius:3px;border:1px solid var(--blue);background:rgba(25,159,216,0.1);color:var(--blue);font-family:var(--M);font-size:9px;cursor:pointer;white-space:nowrap;transition:all .15s;}
.dd-add-btn:hover{background:rgba(25,159,216,0.25);}
.dd-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px;}
.dd-tag{padding:3px 10px;border-radius:20px;background:rgba(25,159,216,0.08);border:1px solid rgba(25,159,216,0.25);color:var(--textd);font-family:var(--M);font-size:9px;letter-spacing:1px;display:flex;align-items:center;gap:4px;}
.dd-tag-del{background:none;border:none;color:rgba(255,51,85,0.6);cursor:pointer;font-size:11px;padding:0;line-height:1;}
/* OFFICE 3D */
.office-3d-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;}
.office-canvas{width:100%;flex:1;display:block;}
.office-hud{position:absolute;top:14px;right:14px;display:flex;flex-direction:column;gap:8px;z-index:5;}
.office-agent-popup{position:absolute;background:rgba(3,9,18,0.95);border:1px solid var(--gb);border-radius:4px;padding:12px 16px;pointer-events:none;z-index:10;backdrop-filter:blur(10px);min-width:160px;}
.office-agent-name{font-family:var(--D);font-size:11px;font-weight:700;letter-spacing:2px;color:var(--textb);margin-bottom:3px;}
.office-agent-role{font-size:9px;color:var(--textd);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;}
/* AGENT CARDS v3 - cinematic */
.ag3{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.ac3{border-radius:6px;overflow:hidden;cursor:pointer;position:relative;transition:all .3s;border:1px solid rgba(25,159,216,0.15);background:var(--glass);backdrop-filter:blur(14px);}
.ac3:hover{transform:translateY(-5px);border-color:rgba(25,159,216,0.5);box-shadow:0 20px 60px rgba(0,0,0,0.6),0 0 30px rgba(25,159,216,0.15);}
.ac3-hero{aspect-ratio:16/9;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.ac3-hero-img{width:100%;height:100%;object-fit:cover;transition:transform .4s;}
.ac3:hover .ac3-hero-img{transform:scale(1.06);}
.ac3-hero-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;position:relative;}
.ac3-hero-ph-bg{position:absolute;inset:0;}
.ac3-hero-letter{font-family:var(--D);font-size:64px;font-weight:900;z-index:1;position:relative;}
.ac3-grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(3,9,18,0.95) 0%,rgba(3,9,18,0.4) 50%,transparent 100%);z-index:2;}
.ac3-overlay{position:absolute;inset:0;z-index:3;display:flex;flex-direction:column;justify-content:flex-end;padding:14px;}
.ac3-status{position:absolute;top:10px;right:10px;width:8px;height:8px;border-radius:50%;}
.ac3-status.active{background:var(--green);box-shadow:0 0 8px var(--green);animation:pd 1.5s infinite;}
.ac3-status.working{background:var(--blue);box-shadow:0 0 8px var(--blue);animation:pd 2s infinite;}
.ac3-status.idle{background:rgba(200,232,248,0.25);}
.ac3-badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px;backdrop-filter:blur(4px);}
.ac3-name{font-family:var(--D);font-size:18px;font-weight:900;letter-spacing:4px;color:white;text-shadow:0 2px 20px rgba(0,0,0,0.8);margin-bottom:3px;line-height:1.1;}
.ac3-desc{font-size:10px;color:rgba(200,232,248,0.65);letter-spacing:0.5px;line-height:1.4;}
.ac3-bottom{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid rgba(25,159,216,0.1);}
.ac3-meta{font-size:9px;color:var(--textd);letter-spacing:1px;text-transform:uppercase;}
.launch-btn{padding:7px 16px;border-radius:20px;border:1px solid;font-family:var(--D);font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px;}
.launch-btn:hover{transform:scale(1.05);}
/* CHAT PANEL */
.chat-overlay{position:fixed;inset:0;z-index:500;display:flex;align-items:stretch;justify-content:flex-end;}
.chat-backdrop{position:absolute;inset:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);}
.chat-panel{position:relative;z-index:1;width:420px;background:rgba(3,9,18,0.98);border-left:1px solid var(--gb);display:flex;flex-direction:column;animation:slideIn .3s ease;}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.chat-header{padding:16px;border-bottom:1px solid var(--gb);display:flex;align-items:center;gap:12px;flex-shrink:0;}
.chat-av{width:44px;height:44px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-family:var(--D);font-size:14px;font-weight:700;border:2px solid;flex-shrink:0;}
.chat-name{font-family:var(--D);font-size:13px;font-weight:700;letter-spacing:3px;color:var(--textb);}
.chat-role{font-size:10px;color:var(--textd);text-transform:uppercase;letter-spacing:1px;margin-top:1px;}
.chat-close{margin-left:auto;background:transparent;border:1px solid var(--gb);color:var(--textd);width:28px;height:28px;border-radius:2px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
.chat-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;}
.chat-msg{display:flex;flex-direction:column;gap:3px;max-width:80%;}
.chat-msg.agent{align-self:flex-start;}
.chat-msg.user{align-self:flex-end;align-items:flex-end;}
.chat-bubble{padding:10px 13px;border-radius:3px;font-size:12px;line-height:1.55;}
.chat-msg.agent .chat-bubble{background:rgba(25,159,216,0.1);border:1px solid rgba(25,159,216,0.2);color:var(--text);border-radius:3px 14px 14px 14px;}
.chat-msg.user .chat-bubble{background:rgba(25,159,216,0.2);border:1px solid rgba(25,159,216,0.35);color:var(--textb);border-radius:14px 3px 14px 14px;}
.chat-ts{font-size:8px;color:var(--textd);letter-spacing:1px;}
.chat-typing{display:flex;gap:4px;align-items:center;padding:10px 13px;}
.chat-dot{width:5px;height:5px;border-radius:50%;background:var(--blue);animation:bounce .9s infinite;}
.chat-dot:nth-child(2){animation-delay:.2s;}
.chat-dot:nth-child(3){animation-delay:.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.chat-input-row{padding:12px;border-top:1px solid var(--gb);display:flex;gap:8px;flex-shrink:0;}
.chat-input{flex:1;background:rgba(25,159,216,0.06);border:1px solid var(--gb);border-radius:3px;color:var(--text);font-family:var(--M);font-size:12px;padding:9px 12px;outline:none;}
.chat-input:focus{border-color:var(--blue);}
.chat-send{padding:9px 16px;background:rgba(25,159,216,0.15);border:1px solid var(--blue);border-radius:3px;color:var(--blue);font-family:var(--M);font-size:10px;letter-spacing:2px;cursor:pointer;transition:all .2s;}
.chat-send:hover{background:rgba(25,159,216,0.3);}
/* AGENT PROFILE v3 */
.ap3-hero{aspect-ratio:21/9;position:relative;overflow:hidden;border-radius:4px;margin-bottom:14px;display:flex;align-items:center;justify-content:center;}
.ap3-hero-bg{position:absolute;inset:0;}
.ap3-hero-letter{font-family:var(--D);font-size:100px;font-weight:900;z-index:1;position:relative;opacity:0.15;}
.ap3-hero-grad{position:absolute;inset:0;z-index:2;}
.ap3-hero-content{position:absolute;bottom:0;left:0;right:0;padding:24px;z-index:3;}
.ap3-hero-name{font-family:var(--D);font-size:36px;font-weight:900;letter-spacing:8px;color:white;text-shadow:0 2px 30px rgba(0,0,0,0.9);margin-bottom:4px;}
.ap3-hero-role{font-size:12px;color:rgba(200,232,248,0.7);text-transform:uppercase;letter-spacing:3px;}
.ap3-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.ap3-btn{padding:9px 20px;border-radius:3px;border:1px solid;font-family:var(--D);font-size:9px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;}
.ap3-btn:hover{transform:translateY(-1px);}
.ap3-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;}

.nb{display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 10px;background:transparent;border:1px solid transparent;border-radius:3px;cursor:pointer;transition:all .2s;color:var(--textd);font-family:var(--M);font-size:8px;letter-spacing:1.5px;text-transform:uppercase;flex-shrink:0;white-space:nowrap;}
.nb:hover{border-color:var(--gb);color:var(--blue);}
.nb.act{border-color:var(--blue);color:var(--blue);background:rgba(25,159,216,.09);box-shadow:0 0 14px rgba(25,159,216,.18);}
.ni{font-size:14px;}
.bn-sep{width:1px;height:28px;background:var(--gb);flex-shrink:0;margin:0 4px;}
/* FULL VIEWS */
.fv{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px;animation:vf .25s ease;}
@keyframes vf{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.vt{font-family:var(--D);font-size:9px;letter-spacing:4px;color:var(--blue);opacity:.55;text-transform:uppercase;padding-bottom:12px;border-bottom:1px solid var(--gb);}
/* AGENTS */
.ag{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:11px;}
.ac{background:var(--glass);border:1px solid var(--gb);border-radius:3px;padding:13px;cursor:pointer;position:relative;overflow:hidden;transition:all .28s;backdrop-filter:blur(14px);}
.ac::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;opacity:0;transition:opacity .3s;}
.ac:hover{transform:translateY(-3px);border-color:var(--gbh);}
.ac:hover::before{opacity:1;}
.ac.active::before{background:linear-gradient(90deg,transparent,var(--green),transparent);}
.ac.working::before{background:linear-gradient(90deg,transparent,var(--blue),transparent);}
.ac.active{border-color:rgba(0,230,118,.2);}
.ac.working{border-color:rgba(25,159,216,.22);}
.ach{display:flex;align-items:center;gap:9px;margin-bottom:9px;}
.aa{width:40px;height:40px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-family:var(--D);font-size:12px;font-weight:700;flex-shrink:0;border:1px solid currentColor;}
.ain{flex:1;min-width:0;}
.an{font-family:var(--D);font-size:10px;font-weight:700;letter-spacing:2px;color:var(--textb);margin-bottom:1px;}
.ar{font-size:9px;color:var(--textd);text-transform:uppercase;letter-spacing:1px;}
.asp{font-size:8px;padding:2px 7px;border-radius:10px;letter-spacing:1px;text-transform:uppercase;}
.asp.active{background:rgba(0,230,118,.12);color:var(--green);border:1px solid rgba(0,230,118,.3);}
.asp.working{background:rgba(25,159,216,.1);color:var(--blue);border:1px solid rgba(25,159,216,.3);}
.asp.idle{background:rgba(200,232,248,.05);color:var(--textd);border:1px solid rgba(200,232,248,.12);}
.att{font-size:10px;color:var(--text);line-height:1.5;margin-bottom:7px;}
.acf{display:flex;justify-content:space-between;font-size:9px;color:var(--textd);text-transform:uppercase;letter-spacing:1px;}
.aind{position:absolute;top:9px;right:9px;width:6px;height:6px;border-radius:50%;}
.aind.active{background:var(--green);box-shadow:0 0 6px var(--green);animation:pd 1.5s infinite;}
.aind.working{background:var(--blue);box-shadow:0 0 6px var(--blue);animation:pd 2s infinite;}
.aind.idle{background:rgba(200,232,248,.2);}
/* PROFILE */
.pv{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px;}
.ph2{display:flex;align-items:center;gap:18px;background:var(--glass);border:1px solid var(--gb);border-radius:3px;padding:18px;backdrop-filter:blur(14px);position:relative;overflow:hidden;}
.ph2::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--blue),transparent);}
.pa{width:76px;height:76px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:var(--D);font-size:26px;font-weight:900;border:2px solid currentColor;flex-shrink:0;}
.pname{font-family:var(--D);font-size:26px;font-weight:900;letter-spacing:6px;color:var(--textb);margin-bottom:3px;}
.prole{font-family:var(--B);font-size:13px;color:var(--textd);text-transform:uppercase;letter-spacing:3px;margin-bottom:10px;}
.pg{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.ps{background:var(--glass);border:1px solid var(--gb);border-radius:3px;padding:13px;backdrop-filter:blur(14px);}
.bb{display:inline-flex;align-items:center;padding:3px 8px;border-radius:2px;font-size:9px;letter-spacing:1px;text-transform:uppercase;margin:2px;}
.bb.b{background:rgba(25,159,216,.12);color:var(--blue);border:1px solid rgba(25,159,216,.28);}
.bb.pu{background:rgba(155,89,182,.12);color:var(--purple);border:1px solid rgba(155,89,182,.28);}
.bb.g{background:rgba(0,230,118,.1);color:var(--green);border:1px solid rgba(0,230,118,.28);}
.bb.y{background:rgba(252,200,46,.12);color:var(--yellow);border:1px solid rgba(252,200,46,.28);}
.bkb{background:transparent;border:1px solid var(--gb);color:var(--textd);font-family:var(--M);font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;padding:6px 12px;border-radius:2px;transition:all .2s;}
.bkb:hover{border-color:var(--blue);color:var(--blue);}
.albox{font-size:10px;padding:6px 8px;border-radius:2px;margin-bottom:5px;line-height:1.4;}
.albox.warn{background:rgba(255,107,53,.1);border:1px solid rgba(255,107,53,.25);color:var(--orange);}
.albox.info{background:rgba(25,159,216,.07);border:1px solid rgba(25,159,216,.15);color:var(--textd);}
.albox.red{background:rgba(255,51,85,.1);border:1px solid rgba(255,51,85,.3);color:var(--red);}
/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;}
.sc{background:var(--glass);border:1px solid var(--gb);border-radius:3px;padding:13px;text-align:center;backdrop-filter:blur(14px);}
.sn{font-family:var(--D);font-size:26px;font-weight:700;line-height:1;}
.sl{font-size:9px;letter-spacing:2px;color:var(--textd);text-transform:uppercase;margin-top:4px;}
/* WAVE PARK */
.wp-n{background:rgba(0,188,212,.08);border:1px solid rgba(0,188,212,.25);border-radius:3px;padding:10px;}
.wp-n.issue{border-color:rgba(255,51,85,.4);background:rgba(255,51,85,.07);animation:pr 2s ease infinite;}
@keyframes pr{0%,100%{box-shadow:none}50%{box-shadow:0 0 12px rgba(255,51,85,.3)}}
.wp-nm{font-family:var(--D);font-size:9px;letter-spacing:2px;color:var(--teal);}
.wp-n.issue .wp-nm{color:var(--red);}
.sf-node{background:rgba(25,159,216,.1);border:1px solid var(--gb);border-radius:2px;padding:4px 8px;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--blue);white-space:nowrap;}
.sf-arr{flex:1;height:2px;background:linear-gradient(90deg,var(--blue),rgba(25,159,216,.1));min-width:20px;}
/* TEAM */
.tm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:14px;}
.tm-card{border-radius:4px;overflow:hidden;cursor:pointer;transition:all .3s;border:1px solid var(--gb);}
.tm-card:hover{transform:translateY(-4px);box-shadow:0 14px 40px rgba(0,0,0,.6);}
.tm-bg{height:150px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.tm-av{font-family:var(--D);font-size:46px;font-weight:900;z-index:1;position:relative;}
.tm-gl{position:absolute;inset:0;opacity:.18;background:radial-gradient(circle at 50% 60%,currentColor 0%,transparent 65%);}
.tm-info{padding:10px;background:rgba(3,9,18,.92);}
.tm-name{font-family:var(--D);font-size:12px;font-weight:700;letter-spacing:3px;color:var(--textb);}
.tm-role{font-size:9px;color:var(--textd);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
.tm-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:6px;}
.tm-tag{font-size:8px;padding:1px 6px;border-radius:10px;background:rgba(25,159,216,.1);color:var(--blue);border:1px solid rgba(25,159,216,.2);}
/* CALENDAR */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-day{background:var(--glass);border:1px solid var(--gb);border-radius:2px;padding:6px;min-height:65px;cursor:pointer;transition:border-color .2s;}
.cal-day:hover{border-color:var(--gbh);}
.cal-day.today{border-color:var(--blue);background:rgba(25,159,216,.08);}
.cal-dn{font-family:var(--D);font-size:11px;color:var(--textd);margin-bottom:4px;}
.cal-day.today .cal-dn{color:var(--blue);}
.cal-ev{font-size:8px;padding:1px 4px;border-radius:1px;margin-bottom:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.cal-ev.task{background:rgba(252,200,46,.15);color:var(--yellow);}
.cal-ev.cron{background:rgba(155,89,182,.15);color:var(--purple);}
.cal-ev.social{background:rgba(255,45,155,.15);color:var(--pink);}
.cal-ev.meet{background:rgba(0,230,118,.1);color:var(--green);}
.cal-hdr{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px;}
.cal-hd{font-size:9px;letter-spacing:2px;color:var(--textd);text-align:center;text-transform:uppercase;padding:4px 0;}
/* PIPELINE */
.pc{display:flex;flex-direction:column;gap:7px;}
.ph3{font-family:var(--D);font-size:8px;letter-spacing:3px;padding:6px 10px;border-radius:2px;text-transform:uppercase;text-align:center;}
.pi{background:var(--glass);border:1px solid var(--gb);border-radius:3px;padding:10px;cursor:pointer;transition:all .2s;}
.pi:hover{border-color:var(--gbh);transform:translateX(2px);}
.pi-tag{font-size:8px;padding:1px 6px;border-radius:10px;display:inline-block;margin-bottom:5px;}
.pi-title{font-size:11px;color:var(--textb);line-height:1.4;margin-bottom:4px;}
.pi-meta{font-size:9px;color:var(--textd);}
/* TASKS */
.ti{display:flex;align-items:center;gap:10px;background:var(--glass);border:1px solid var(--gb);border-radius:3px;padding:10px 13px;cursor:pointer;transition:all .2s;}
.ti:hover{border-color:var(--gbh);}
.tcb{width:16px;height:16px;border:1px solid var(--gb);border-radius:2px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;}
.tcb.done{background:rgba(0,230,118,.15);border-color:var(--green);color:var(--green);}
.tt{flex:1;font-size:11px;}
.tt.done{text-decoration:line-through;color:var(--textd);}
.ta{font-size:9px;color:var(--blue);font-family:var(--D);}
/* JOURNAL */
.je{background:var(--glass);border:1px solid var(--gb);border-radius:3px;padding:14px;margin-bottom:10px;}
.jd{font-family:var(--D);font-size:9px;letter-spacing:3px;color:var(--yellow);margin-bottom:8px;}
.jag{font-size:9px;color:var(--blue);margin-bottom:5px;text-transform:uppercase;letter-spacing:2px;}
.jtext{font-size:11px;color:var(--text);line-height:1.7;}
.jtg{font-size:8px;padding:1px 6px;border-radius:10px;background:rgba(25,159,216,.1);color:var(--blue);border:1px solid rgba(25,159,216,.2);display:inline-block;margin-right:4px;margin-top:6px;}
/* TRADR */
.prod-card{background:var(--glass);border:1px solid var(--gb);border-radius:3px;overflow:hidden;cursor:pointer;transition:all .25s;}
.prod-card:hover{transform:translateY(-3px);}
.prod-img{height:110px;display:flex;align-items:center;justify-content:center;font-size:38px;border-bottom:1px solid var(--gb);}
.prod-info{padding:10px;}
.prod-name{font-family:var(--D);font-size:10px;letter-spacing:2px;color:var(--textb);margin-bottom:3px;}
.prod-price{font-size:14px;font-weight:700;color:var(--yellow);}
.prod-st{font-size:9px;margin-top:3px;}
.prod-st.low{color:var(--orange);}
.prod-st.ok{color:var(--green);}
/* MARKETING */
.mkt-ch{background:var(--glass);border:1px solid var(--gb);border-radius:3px;padding:13px;}
.mkt-chn{font-family:var(--D);font-size:9px;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
.mkt-br{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.mkt-bl{color:var(--textd);width:60px;flex-shrink:0;font-size:9px;}
.mkt-bw{flex:1;height:4px;background:rgba(255,255,255,.07);}
.mkt-bf{height:100%;}
.mkt-bv{color:var(--text);font-size:9px;flex-shrink:0;width:35px;text-align:right;}
/* SOCIAL */
.soc-m{background:var(--glass);border:1px solid var(--gb);border-radius:3px;padding:13px;position:relative;overflow:hidden;}
.soc-p{font-family:var(--D);font-size:8px;letter-spacing:3px;color:var(--textd);text-transform:uppercase;margin-bottom:8px;}
.soc-n{font-family:var(--D);font-size:28px;font-weight:700;line-height:1;}
/* LEADS */
.li{background:var(--glass);border:1px solid var(--gb);border-radius:3px;padding:11px;cursor:pointer;display:flex;gap:10px;transition:all .2s;}
.li:hover{border-color:var(--gbh);}
.lav{width:36px;height:36px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-family:var(--D);font-size:11px;font-weight:700;flex-shrink:0;border:1px solid;}
.lbody{flex:1;min-width:0;}
.lfrom{font-size:11px;color:var(--textb);margin-bottom:2px;}
.lmsg{font-size:10px;color:var(--textd);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.lmeta{display:flex;gap:8px;margin-top:4px;font-size:9px;color:var(--textd);}
.lbadge{font-size:8px;padding:1px 6px;border-radius:10px;}
.lbadge.dm{background:rgba(155,89,182,.15);color:var(--purple);border:1px solid rgba(155,89,182,.3);}
.lbadge.email{background:rgba(25,159,216,.1);color:var(--blue);border:1px solid rgba(25,159,216,.2);}
.lbadge.comment{background:rgba(255,45,155,.1);color:var(--pink);border:1px solid rgba(255,45,155,.2);}
.lbadge.new{background:rgba(255,107,53,.15);color:var(--orange);border:1px solid rgba(255,107,53,.3);}
/* MONITOR */
.mon-s{background:var(--glass);border:1px solid var(--gb);border-radius:3px;padding:10px;font-size:10px;margin-bottom:8px;}
.mon-bar{height:6px;background:rgba(25,159,216,.1);overflow:hidden;margin-bottom:3px;}
.mon-bf{height:100%;background:linear-gradient(90deg,var(--blue),var(--pink));}
.spark{display:flex;align-items:flex-end;gap:1px;height:28px;}
.spk{flex:1;background:rgba(25,159,216,.4);min-height:2px;}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(25,159,216,.2);}
</style>
</head>
<body>
<div id="root"></div>

  return v.done;
}


// ORB - Electric Wave / Surf Theme
function AceOrb({state}){
  const cRef=useRef(null),rafRef=useRef(null);
  useEffect(()=>{
    const cv=cRef.current;if(!cv)return;
    const ctx=cv.getContext('2d');
    const W=320,H=320,cx=W/2,cy=H/2;
    cv.width=W;cv.height=H;
    let t=0;

    // Particle system for spray/foam
    const particles=Array.from({length:60},(_,i)=>({
      angle:Math.random()*Math.PI*2,
      r:85+Math.random()*40,
      speed:0.004+Math.random()*0.008,
      size:1+Math.random()*3,
      life:Math.random(),
      decay:0.003+Math.random()*0.005,
      col:Math.random()>0.5?'#FF2D9B':'#199FD8',
    }));

    function draw(){
      rafRef.current=requestAnimationFrame(draw);
      t+=0.018;
      ctx.clearRect(0,0,W,H);

      const idle=state==='idle',lst=state==='listening',prc=state==='processing',spk=state==='speaking';
      const energy=idle?0.4:lst?0.85:prc?1.0:0.75;
      const speed=idle?1:lst?2.2:prc?3.5:1.8;

      // ── OUTER GLOW RINGS (pink + blue) ──────────────────
      // Keep the pink/blue balls effect from before as orbiting energy
      [
        {col:'#FF2D9B',r:120,speed:0.6,size:7,trail:3},
        {col:'#199FD8',r:108,speed:-0.45,size:5,trail:3},
        {col:'#FF2D9B',r:96,speed:0.8,size:4,trail:2},
        {col:'#9B59B6',r:130,speed:-0.3,size:5,trail:2},
      ].forEach(function(b,i){
        const a=t*b.speed+i*1.5;
        for(let tr=0;tr<b.trail;tr++){
          const ta=a-tr*0.12;
          const bx=cx+Math.cos(ta)*b.r*(0.9+Math.sin(t*0.7+i)*0.08);
          const by=cy+Math.sin(ta)*b.r*(0.55+Math.sin(t*0.5+i)*0.06);
          const alpha=(1-tr/b.trail)*(0.6+energy*0.3);
          ctx.beginPath();
          ctx.arc(bx,by,b.size*(1-tr*0.25),0,Math.PI*2);
          const rgb=b.col==='#FF2D9B'?'255,45,155':b.col==='#199FD8'?'25,159,216':'155,89,182';
          ctx.fillStyle=`rgba(${rgb},${alpha})`;
          ctx.fill();
          // Glow
          const grd=ctx.createRadialGradient(bx,by,0,bx,by,b.size*3);
          grd.addColorStop(0,`rgba(${rgb},${alpha*0.4})`);
          grd.addColorStop(1,'transparent');
          ctx.fillStyle=grd;
          ctx.beginPath();ctx.arc(bx,by,b.size*3,0,Math.PI*2);ctx.fill();
        }
      });

      // ── AMBIENT GLOW ─────────────────────────────────────
      const ambR=energy*55+40;
      const amb=ctx.createRadialGradient(cx,cy,0,cx,cy,ambR);
      amb.addColorStop(0,'rgba(0,200,255,0.08)');
      amb.addColorStop(0.5,'rgba(100,220,255,0.04)');
      amb.addColorStop(1,'transparent');
      ctx.fillStyle=amb;ctx.beginPath();ctx.arc(cx,cy,ambR,0,Math.PI*2);ctx.fill();

      // ── WAVE CORE ─────────────────────────────────────────
      // Draw multiple layered wave rings creating a surf wave / barrel effect
      const baseR=62;
      const numWaves=8;
      const waveAmp=idle?8:lst?18:prc?24:12;

      for(let w=numWaves;w>=0;w--){
        const wFrac=w/numWaves;
        const wR=baseR*(0.3+wFrac*0.7);
        const wAmp=waveAmp*(1-wFrac*0.4)*(0.5+energy*0.5);

function useVoice({onT,onS}){
  const recRef=useRef(null);const syn=window.speechSynthesis;
  if(syn&&syn.getVoices().length===0)syn.addEventListener('voiceschanged',function(){});

  const start=useCallback(function(){
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert('Voice requires Chrome or Edge.');return;}
    try{
      const r=new SR();
      r.lang='en-AU';r.continuous=false;r.interimResults=false;
      r.onstart=function(){onS('listening');};
      r.onresult=function(e){onT(e.results[0][0].transcript);};
      r.onerror=function(e){
        onS('idle');
        if(e.error==='not-allowed')alert('Microphone access denied. Allow mic access in browser settings then try again.');
      };
      r.start();recRef.current=r;
    }catch(err){console.error(err);onS('idle');}
  },[onT,onS]);

  const stop=useCallback(function(){
    if(recRef.current){try{recRef.current.stop();}catch(e){}recRef.current=null;}
    onS('idle');
  },[onS]);

  // speak(text, agentId) - uses per-agent voice profile
  const speak=useCallback(function(text,agentId){
    if(!syn)return;syn.cancel();
    const profile=AGENT_VOICES[agentId]||{rate:0.92,pitch:0.85,hint:'Alex'};
    const u=new SpeechSynthesisUtterance(text);
    u.rate=profile.rate;u.pitch=profile.pitch;u.volume=1.0;
    function trySpeak(){
      const voices=syn.getVoices();
      // Try to match hint name first, then fallback chain
      const pref=voices.find(function(v){return profile.hint&&v.name.includes(profile.hint);})
        ||voices.find(function(v){return v.name.includes('Google')&&v.lang.startsWith('en');})
        ||voices.find(function(v){return v.name.includes('Daniel');})
        ||voices.find(function(v){return v.name.includes('Alex');})
        ||voices.find(function(v){return v.name.includes('Samantha');})
        ||voices.find(function(v){return v.lang.startsWith('en');});
      if(pref)u.voice=pref;
      u.onstart=function(){onS('speaking');};
      u.onend=function(){onS('idle');};
      u.onerror=function(){onS('idle');};
      syn.speak(u);
    }
    if(syn.getVoices().length>0){trySpeak();}
    else{syn.addEventListener('voiceschanged',trySpeak,{once:true});}
  },[onS]);

  return{start,stop,speak};
}

// ── OFFICE 3D (Isometric Canvas) ────────────────────────────────

  // Isometric projection helpers
  function isoProject(x,y,z,camX,camZ,offsetX,offsetY,tileW,tileH){
    const rx=x-camX, rz=z-camZ;

    const OX=W/2,OY=160;

    const GRID=[
      {gx:-3,gz:-2},{gx:-1,gz:-2},{gx:1,gz:-2},{gx:3,gz:-2},
      {gx:-3,gz:0},{gx:-1,gz:0},{gx:1,gz:0},{gx:3,gz:0},

      ),

    )

function NexusView(){
  var ce=React.createElement;
  var REPOS=[
    {name:'claw-code',label:'OpenClaw Core',color:'#19bde0',sym:6098,clusters:289,flows:300,agents:['CHAD','ALL'],domain:'Agent framework core',gh:'StrategyCentral/claw-code'},
    {name:'NinjaTrader---Indicators',label:'NinjaTrader Indicators',color:'#f97316',sym:4998,clusters:385,flows:111,agents:['AXIOM'],domain:'Trading strategies & signals',gh:'acetradingstrategies/NinjaTrader---Indicators'},
    {name:'ace_sports_bots',label:'ACE Sports Bots',color:'#eab308',sym:3022,clusters:141,flows:231,agents:['DAVE','BOB'],domain:'Sports prediction bots',gh:'acetradingstrategies/ace_sports_bots'},
    {name:'polymarket-crypto-toolkit',label:'Polymarket Toolkit',color:'#22c55e',sym:1216,clusters:62,flows:93,agents:['DAVE'],domain:'SOL prediction market bot',gh:'StrategyCentral/polymarket-crypto-toolkit'},
    {name:'nss-dashboard',label:'NSS Dashboard',color:'#a855f7',sym:431,clusters:28,flows:33,agents:['PETE'],domain:'NSS monitoring dashboard',gh:'StrategyCentral/nss-dashboard'},
    {name:'ace-marketing-suite',label:'ACE Marketing Suite',color:'#f97316',sym:120,clusters:4,flows:1,agents:['PABLO','MEGAN'],domain:'Campaign & content tools',gh:'StrategyCentral/ace-marketing-suite'},
    {name:'ace-mission-control',label:'ACE Mission Control',color:'#19bde0',sym:11,clusters:0,flows:0,agents:['CHAD'],domain:'This dashboard',gh:'StrategyCentral/ace-mission-control'},
    {name:'ace-relay',label:'ACE Relay',color:'#eab308',sym:10,clusters:2,flows:0,agents:['CHAD','LARRY'],domain:'Signal relay bridge',gh:'StrategyCentral/ace-relay'},
    {name:'ace-wave-park-licensing',label:'Wave Park Licensing',color:'#22c55e',sym:0,clusters:0,flows:0,agents:['LARRY'],domain:'License validation & Boardshop',gh:'StrategyCentral/ace-wave-park-licensing',empty:true},
  ];
  var activeState=React.useState(null);
  var active=activeState[0];
  var setActive=activeState[1];
  var activeRepo=REPOS.find(function(r){return r.name===active;})||null;
  var canvasRef=React.useRef(null);
  var simRef=React.useRef(null);
  var rafRef=React.useRef(null);
  var mono={fontFamily:'monospace',letterSpacing:'1px'};
  var dim='rgba(255,255,255,0.3)';

  React.useEffect(function(){
    var canvas=canvasRef.current;
    if(!canvas)return;
    var ctx=canvas.getContext('2d');
    var W=canvas.parentElement.clientWidth||700;
    var H=canvas.parentElement.clientHeight||500;
    canvas.width=W;canvas.height=H;

    // Generate nodes from real repo data
    var nodes=[];
    var edges=[];
    var rng=function(seed){var x=Math.sin(seed+1)*10000;return x-Math.floor(x);};
    var idx=0;
    REPOS.forEach(function(repo,ri){
      var count=Math.max(8,Math.min(180,Math.floor(repo.sym/35)));
      var cx=W*0.15+rng(ri*7)*W*0.7;
      var cy=H*0.15+rng(ri*13)*H*0.7;
      var hubIdx=nodes.length;
      for(var i=0;i<count;i++){
        var ang=rng(idx*3)*Math.PI*2;
        var dist=rng(idx*7)*120+5;
        var sz=i===0?5:(rng(idx*11)*3+1.5);
        nodes.push({
          x:cx+Math.cos(ang)*dist*(i===0?0:1),
          y:cy+Math.sin(ang)*dist*(i===0?0:1),
          vx:(rng(idx*17)-0.5)*0.3,
          vy:(rng(idx*19)-0.5)*0.3,
          r:sz,
          color:repo.color,
          repo:ri,
          hub:i===0,
          label:i===0?repo.label:null,
          alpha:i===0?1:(0.4+rng(idx*23)*0.6)
        });
        if(i>0&&i<count){edges.push([hubIdx,nodes.length-1]);}
        idx++;
      }
      // cross-repo edges
      if(ri>0){edges.push([0,hubIdx]);}
    });
    // extra cross edges
    for(var e=0;e<40;e++){
      var a=Math.floor(rng(e*31)*nodes.length);
      var b=Math.floor(rng(e*37)*nodes.length);
      if(a!==b&&nodes[a].repo!==nodes[b].repo)edges.push([a,b]);
    }

    simRef.current={nodes:nodes,edges:edges,angle:0};

    function tick(){
      var sim=simRef.current;
      if(!sim)return;
      sim.angle+=0.0015;
      var cosA=Math.cos(sim.angle),sinA=Math.sin(sim.angle);
      var cx2=W/2,cy2=H/2;

      // simple force: repel from others, attract to repo center, dampen
      sim.nodes.forEach(function(n,i){
        var fx=0,fy=0;
        // repulsion
        for(var j=0;j<sim.nodes.length;j+=3){
          if(i===j)continue;
          var m=sim.nodes[j];
          var dx=n.x-m.x,dy=n.y-m.y;
          var d=Math.sqrt(dx*dx+dy*dy)||1;
          if(d<60){var f=0.4/d;fx+=dx*f;fy+=dy*f;}
        }
        // gentle center pull
        fx+=(cx2-n.x)*0.0005;
        fy+=(cy2-n.y)*0.0005;
        n.vx=(n.vx+fx)*0.94;
        n.vy=(n.vy+fy)*0.94;
        n.x+=n.vx;n.y+=n.vy;
        // clamp
        if(n.x<20)n.x=20;if(n.x>W-20)n.x=W-20;
        if(n.y<20)n.y=20;if(n.y>H-20)n.y=H-20;
      });

      // rotate all nodes around center
      sim.nodes.forEach(function(n){
        var rx=n.x-cx2,ry=n.y-cy2;
        n.x=cx2+rx*cosA-ry*sinA*0.002+rx*(1-cosA*0.002);
        n.y=cy2+rx*sinA*0.002+ry*cosA*0.002+ry*(1-cosA*0.002);
      });

      ctx.clearRect(0,0,W,H);
      ctx.fillStyle='#030912';
      ctx.fillRect(0,0,W,H);

      // edges
      ctx.lineWidth=0.4;
      sim.edges.forEach(function(e){
        var a=sim.nodes[e[0]],b=sim.nodes[e[1]];
        var sameRepo=a.repo===b.repo;
        ctx.strokeStyle=sameRepo?a.color.replace(')',',0.12)').replace('rgb','rgba').replace('#','rgba(').replace('rgba(',''):
          'rgba(255,255,255,0.04)';
        // parse hex color for edges
        var hex=a.color;
        var r2=parseInt(hex.slice(1,3),16),g2=parseInt(hex.slice(3,5),16),b2=parseInt(hex.slice(5,7),16);
        ctx.strokeStyle=sameRepo?'rgba('+r2+','+g2+','+b2+',0.15)':'rgba(255,255,255,0.035)';
        ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
      });

      // nodes
      sim.nodes.forEach(function(n){
        var hex=n.color;
        var r2=parseInt(hex.slice(1,3),16),g2=parseInt(hex.slice(3,5),16),b2=parseInt(hex.slice(5,7),16);
        var al=n.hub?1:n.alpha;
        // glow for hubs
        if(n.hub){
          ctx.beginPath();
          ctx.arc(n.x,n.y,n.r+6,0,Math.PI*2);
          ctx.fillStyle='rgba('+r2+','+g2+','+b2+',0.12)';
          ctx.fill();
        }
        ctx.beginPath();
        ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
        ctx.fillStyle='rgba('+r2+','+g2+','+b2+','+al+')';
        ctx.fill();
        // label hubs
        if(n.hub&&n.label){
          ctx.font='bold 9px monospace';
          ctx.fillStyle='rgba('+r2+','+g2+','+b2+',0.9)';
          ctx.textAlign='center';
          ctx.fillText(n.label,n.x,n.y+n.r+11);
        }
      });

      rafRef.current=requestAnimationFrame(tick);
    }
    tick();
    return function(){
      cancelAnimationFrame(rafRef.current);
      simRef.current=null;
    };
  },[]);

  var totalSym=REPOS.reduce(function(a,r){return a+r.sym;},0);

  return ce('div',{style:{display:'flex',height:'100%',width:'100%',overflow:'hidden',background:'#030912'}},
    // SIDEBAR
    ce('div',{style:{width:'190px',flexShrink:0,borderRight:'1px solid rgba(255,255,255,0.06)',display:'flex',flexDirection:'column',overflowY:'auto'}},
      ce('div',{style:{padding:'12px',borderBottom:'1px solid rgba(255,255,255,0.06)'}},
        ce('div',{style:Object.assign({},mono,{fontSize:'8px',letterSpacing:'3px',color:'#19bde0',marginBottom:'3px'})},'// NEXUS MAP'),
        ce('div',{style:Object.assign({},mono,{fontSize:'7px',color:dim})},totalSym.toLocaleString()+' symbols')
      ),
      REPOS.map(function(r){
        var on=active===r.name;
        return ce('div',{key:r.name,onClick:function(){setActive(on?null:r.name);},style:{padding:'8px 12px',cursor:'pointer',borderLeft:'2px solid '+(on?r.color:'transparent'),background:on?r.color+'12':'transparent',transition:'all .12s'}},
          ce('div',{style:Object.assign({},mono,{fontSize:'9px',color:on?r.color:'rgba(255,255,255,0.65)',marginBottom:'2px'})},(on?'\u25b6 ':'')+r.label),
          ce('div',{style:Object.assign({},mono,{fontSize:'7px',color:dim})},r.empty?'\u26a0 awaiting code':r.sym.toLocaleString()+' sym')
        );
      }),
      ce('div',{style:{marginTop:'auto',padding:'10px 12px',borderTop:'1px solid rgba(255,255,255,0.06)'}},
        ce('div',{style:Object.assign({},mono,{fontSize:'7px',color:'rgba(255,255,255,0.2)',lineHeight:'1.8'})},'CHAD \u00b7 AXIOM \u00b7 LARRY \u00b7 DAVE'),
        ce('div',{style:Object.assign({},mono,{fontSize:'7px',color:'#22c55e',marginTop:'4px'})},'\u25cf MCP ACTIVE')
      )
    ),
    // MAIN
    ce('div',{style:{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',position:'relative'}},
      // TOP BAR
      ce('div',{style:{padding:'8px 14px',borderBottom:'1px solid rgba(255,255,255,0.06)',display:'flex',gap:'16px',alignItems:'center',flexShrink:0,zIndex:2}},
        ce('div',{style:Object.assign({},mono,{fontSize:'8px',letterSpacing:'3px',color:'#19bde0'})},'KNOWLEDGE GRAPH'),
        ce('div',{style:Object.assign({},mono,{fontSize:'7px',color:dim})},REPOS.reduce(function(a,r){return a+Math.max(8,Math.min(180,Math.floor(r.sym/35)));},0)+' nodes \u00b7 live simulation'),
        ce('a',{href:'https://gitnexus.vercel.app',target:'_blank',style:Object.assign({},mono,{marginLeft:'auto',fontSize:'8px',color:'#19bde0',textDecoration:'none',padding:'3px 9px',border:'1px solid rgba(25,189,224,0.35)',borderRadius:'2px',letterSpacing:'1px'})},'\u2197 FULL GITNEXUS')
      ),
      // CANVAS fills remaining space
      ce('div',{style:{flex:1,position:'relative',overflow:'hidden'}},
        ce('canvas',{ref:canvasRef,style:{display:'block',width:'100%',height:'100%'}}),
        // overlay detail panel when repo selected
        activeRepo?ce('div',{style:{position:'absolute',top:'12px',right:'12px',width:'220px',background:'rgba(3,9,18,0.92)',border:'1px solid '+activeRepo.color+'44',borderRadius:'4px',padding:'14px',zIndex:10}},
          ce('div',{style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'10px'}},
            ce('div',{style:{width:'7px',height:'7px',borderRadius:'50%',background:activeRepo.color,flexShrink:0}}),
            ce('div',{style:Object.assign({},mono,{fontSize:'11px',color:'rgba(255,255,255,0.9)',fontWeight:'bold'})},activeRepo.label)
          ),
          ce('div',{style:Object.assign({},mono,{fontSize:'7px',color:dim,marginBottom:'10px'})},activeRepo.domain),
          ce('div',{style:{display:'flex',gap:'6px',marginBottom:'12px'}},
            ce('div',{style:{flex:1,padding:'7px',background:'rgba(255,255,255,0.03)',borderRadius:'3px',textAlign:'center'}},ce('div',{style:Object.assign({},mono,{fontSize:'6px',color:dim,letterSpacing:'1px'})},'SYM'),ce('div',{style:Object.assign({},mono,{fontSize:'13px',color:activeRepo.color,fontWeight:'bold'})},activeRepo.sym.toLocaleString())),
            ce('div',{style:{flex:1,padding:'7px',background:'rgba(255,255,255,0.03)',borderRadius:'3px',textAlign:'center'}},ce('div',{style:Object.assign({},mono,{fontSize:'6px',color:dim,letterSpacing:'1px'})},'CLUST'),ce('div',{style:Object.assign({},mono,{fontSize:'13px',color:activeRepo.color,fontWeight:'bold'})},String(activeRepo.clusters))),
            ce('div',{style:{flex:1,padding:'7px',background:'rgba(255,255,255,0.03)',borderRadius:'3px',textAlign:'center'}},ce('div',{style:Object.assign({},mono,{fontSize:'6px',color:dim,letterSpacing:'1px'})},'FLOWS'),ce('div',{style:Object.assign({},mono,{fontSize:'13px',color:activeRepo.color,fontWeight:'bold'})},String(activeRepo.flows)))
          ),
          ce('div',{style:{display:'flex',gap:'5px',flexWrap:'wrap',marginBottom:'12px'}},
            activeRepo.agents.map(function(a){return ce('div',{key:a,style:Object.assign({},mono,{fontSize:'7px',color:activeRepo.color,padding:'2px 8px',border:'1px solid '+activeRepo.color+'55',borderRadius:'2px'})},a);})
          ),
          ce('div',{style:{marginBottom:'5px',padding:'6px 8px',background:'rgba(0,0,0,0.5)',borderRadius:'2px',fontFamily:'monospace',fontSize:'7px',color:'rgba(255,255,255,0.4)'}},
            'gitnexus_impact({repo:"'+activeRepo.name+'"})'),
          ce('a',{href:'https://github.com/'+activeRepo.gh,target:'_blank',style:Object.assign({},mono,{display:'block',marginTop:'8px',fontSize:'7px',color:activeRepo.color,textDecoration:'none',padding:'4px 9px',border:'1px solid '+activeRepo.color+'33',borderRadius:'2px',textAlign:'center'})},'\u2197 GITHUB')
        ):null
      )
    )
  );
}

function App(){
  const[view,setView]=useState('mission');
  const[selAgent,setSelAgent]=useState(null);
  const[chatAgent,setChatAgent]=useState(null);
  function nav(v){if(!v.startsWith('agt-')&&v!=='agents')setSelAgent(null);setView(v);}
  function selectAgent(a){setSelAgent(a);setView('agent-profile');}
  function openChat(a){setChatAgent(a);}
  function closeChat(){setChatAgent(null);}
  function renderContent(){
    if(view==='mission')return React.createElement(MissionView,{onNav:nav});
    function wrap(child){return React.createElement('div',{className:'ml',style:{overflow:'hidden'}},child);}
    if(view==='agent-profile'&&selAgent)return wrap(React.createElement(AgentProfile3,{agent:selAgent,onBack:function(){nav('agents');},onChat:openChat}));
    if(view==='agents'||view.startsWith('agt-'))return wrap(React.createElement(AgentsView3,{sub:view,onSelect:selectAgent,onChat:openChat}));
    if(view==='leads')return wrap(React.createElement(LeadsView));
    if(view==='content')return wrap(React.createElement(ContentView));
    if(view==='wavepark')return wrap(React.createElement(WaveParkView));
    if(view==='calendar')return wrap(React.createElement(CalendarView));
    if(view==='tasks')return wrap(React.createElement(TasksView));
    if(view==='marketing')return wrap(React.createElement(MarketingView));
    if(view==='team')return wrap(React.createElement(TeamView,{onSelect:selectAgent}));
    if(view==='social')return wrap(React.createElement(SocialView));
    if(view==='support')return wrap(React.createElement(SupportView));
    if(view==='monitor')return wrap(React.createElement(MonitorView));
    if(view==='journal')return wrap(React.createElement(JournalView));
    if(view==='tradr')return wrap(React.createElement(TradrView));
    if(view==='map')return wrap(React.createElement(MapView));
    if(view==='office')return wrap(React.createElement(OfficeView));
    if(view==='nexus')return React.createElement(NexusView);
    return wrap(React.createElement('div',{className:'fv'},React.createElement(Placeholder,{title:view.toUpperCase()})));
  }
  return React.createElement(React.Fragment,null,
    React.createElement(TopBar,{onNav:nav}),
    renderContent(),
    React.createElement(BotNav,{cur:view,onNav:nav}),
    chatAgent&&React.createElement(ChatPanel,{agent:chatAgent,onClose:closeChat})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
